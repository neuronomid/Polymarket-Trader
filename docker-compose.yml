services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: polymarket_trader
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: polymarket
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket -d polymarket_trader"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POLYMARKET_DATABASE__HOST: postgres
      POLYMARKET_DATABASE__PORT: 5432
    volumes:
      - ./config:/app/config:ro

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - app

volumes:
  pgdata:
