# Polymarket Trader Agent — Default Configuration
# Override via environment variables with POLYMARKET_ prefix.
# Example: POLYMARKET_DATABASE__HOST=myhost

operator_mode: paper
log_level: INFO
paper_balance_usd: 500.0

database:
  host: localhost
  port: 5432
  name: polymarket_trader
  user: polymarket
  password: polymarket

risk:
  max_daily_deployment_pct: 0.10
  max_daily_drawdown_pct: 0.08
  max_total_open_exposure_usd: 250.0
  max_simultaneous_positions: 5
  soft_warning_pct: 0.03
  risk_reduction_pct: 0.05
  entries_disabled_pct: 0.065
  hard_kill_switch_pct: 0.08
  default_category_exposure_cap_usd: 250.0
  sports_category_exposure_cap_usd: 100.0
  max_cluster_exposure_usd: 150.0
  max_single_catalyst_exposure_usd: 100.0
  max_correlation_burden_score: 0.8
  max_order_depth_fraction: 0.12
  max_entry_impact_edge_fraction: 0.25
  depth_levels_for_sizing: 3
  sizing_base_fraction: 0.05
  ambiguity_penalty_weight: 0.3
  correlation_penalty_weight: 0.2
  weak_source_penalty_weight: 0.2
  timing_penalty_weight: 0.1
  sports_quality_gate_multiplier: 0.5
  soft_warning_size_multiplier: 0.75
  risk_reduction_size_multiplier: 0.40
  min_evidence_score_soft_warning: 0.6

cost:
  daily_llm_budget_usd: 5.0
  daily_opus_escalation_budget_usd: 1.0
  max_single_workflow_usd: 2.0
  max_per_accepted_candidate_usd: 3.0
  max_per_open_position_per_day_usd: 1.0
  lifetime_experiment_budget_usd: 500.0
  cost_of_selectivity_target_ratio: 0.20
  cumulative_review_cost_warning_pct: 0.08
  cumulative_review_cost_cap_pct: 0.15
  cost_inefficient_edge_fraction: 0.20
  daily_budget_restrict_pct: 0.10
  lifetime_budget_restrict_pct: 0.75

scanner:
  poll_interval_seconds: 60
  cache_depth_hours: 4
  freshness_threshold_seconds: 180
  degraded_level1_minutes: 3
  degraded_level2_hours: 4
  degraded_level3_hours: 8

eligibility:
  min_liquidity_usd: 500.0
  max_spread: 0.15
  min_horizon_hours: 24
  max_horizon_days: 90
  sports_min_horizon_hours: 48

models:
  # API keys should be set via environment variables, not in this file.
  # OPENROUTER_API_KEY=sk-or-...
  # POLYMARKET_MODELS__OPENAI_API_KEY=sk-...
  # Optional legacy fallback:
  # POLYMARKET_MODELS__ANTHROPIC_API_KEY=sk-ant-...
  tier_a_model: claude-opus-4-6
  tier_b_model: claude-sonnet-4-6
  tier_c_model: gpt-5.4-nano
  tier_c_alt_model: gpt-5.4-mini

telegram:
  enabled: false
  max_retries: 3
  retry_base_delay_seconds: 1.0
  dedup_window_seconds: 300
  request_timeout_seconds: 30.0

notification:
  use_llm_composer: false
  broadcast_severities:
    - critical
  max_per_type_per_hour: 20

calibration:
  initial_correction_min_trades: 20
  category_min_trades: 30
  horizon_bucket_min_trades: 25
  sports_min_trades: 40
  size_penalty_reduction_min_trades: 30
  preliminary_week: 4
  intermediate_week: 8
  decision_week: 12
  viability_min_forecasts: 50

absence:
  no_new_entries_hours: 48
  first_size_reduction_hours: 72
  first_size_reduction_pct: 0.25
  second_size_reduction_hours: 96
  second_size_reduction_pct: 0.25
  graceful_winddown_hours: 120

polymarket_api:
  gamma_base_url: https://gamma-api.polymarket.com
  clob_base_url: https://clob.polymarket.com
  subgraph_url: https://api.thegraph.com/subgraphs/name/polymarket/polymarket-matic
  request_timeout: 15.0
  connect_timeout: 5.0
  gamma_max_requests_per_10s: 250
  clob_max_requests_per_10s: 400
  max_retries: 3
  backoff_base_seconds: 1.0
  backoff_max_seconds: 30.0
  market_list_page_size: 100
  orderbook_depth_levels: 5
  consecutive_failure_threshold: 5
